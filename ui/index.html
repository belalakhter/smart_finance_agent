<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smat Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg:          #0f0f0f;
  --c-sidebar:     #141414;
  --c-surface:     #1c1c1c;
  --c-surface-2:   #242424;
  --c-surface-3:   #2c2c2c;
  --c-border:      #2a2a2a;
  --c-border-2:    #333;
  --c-text:        #e8e8e8;
  --c-text-2:      #888;
  --c-text-3:      #444;
  --c-accent:      #e8e8e8;
  --c-danger:      #e05c5c;
  --c-green:       #4caf82;
  --c-user-msg:    #1c1c1c;
  --r-sm:          6px;
  --r-md:          10px;
  --r-lg:          14px;
  --sidebar-w:     300px;
  --topbar-h:      52px;
  --input-area-h:  80px;
  font-size: 14px;
}

html, body {
  height: 100%;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: 'Geist', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#app {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--c-sidebar);
  border-right: 1px solid var(--c-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sb-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--c-border);
  flex-shrink: 0;
}
.sb-logo {
  width: 28px; height: 28px;
  background: var(--c-text);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace;
  font-size: 13px; font-weight: 500;
  color: #0f0f0f;
  flex-shrink: 0;
  letter-spacing: -0.03em;
}
.sb-title {
  font-size: 14px; font-weight: 600;
  color: var(--c-text);
  letter-spacing: -0.02em;
}

.sb-new-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 10px 6px;
  padding: 8px 12px;
  background: transparent;
  border: 1px solid var(--c-border-2);
  border-radius: var(--r-sm);
  color: var(--c-text-2);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.sb-new-btn:hover {
  background: var(--c-surface-2);
  color: var(--c-text);
  border-color: #444;
}
.sb-new-btn svg { opacity: 0.6; flex-shrink: 0; }
.sb-new-btn:hover svg { opacity: 1; }

.sb-section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-text-3);
  padding: 12px 16px 4px;
  flex-shrink: 0;
}

#conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 2px 6px 8px;
}
#conv-list::-webkit-scrollbar { width: 3px; }
#conv-list::-webkit-scrollbar-thumb { background: var(--c-border-2); border-radius: 3px; }

.conv-item {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 4px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  min-height: 34px;
}
.conv-item:hover { background: var(--c-surface-2); }
.conv-item.active { background: var(--c-surface-3); }

.conv-name {
  flex: 1;
  font-size: 13px;
  color: var(--c-text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 8px 4px;
  line-height: 1.3;
  transition: color 0.12s;
  user-select: none;
}
.conv-item:hover .conv-name,
.conv-item.active .conv-name { color: var(--c-text); }

.conv-active-dot {
  width: 5px; height: 5px;
  background: var(--c-text-3);
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: 2px;
  display: none;
}
.conv-item.active .conv-active-dot { display: block; background: var(--c-text-2); }

.conv-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.12s;
  flex-shrink: 0;
}
.conv-item:hover .conv-actions { opacity: 1; }
.conv-item.active .conv-actions { opacity: 1; }

.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 4px;
  border: none;
  background: transparent;
  color: var(--c-text-3);
  cursor: pointer;
  transition: color 0.12s, background 0.12s;
  flex-shrink: 0;
  font-size: 12px;
  line-height: 1;
}
.icon-btn svg {
  width: 16px;
  height: 16px;
}
.icon-btn:hover { color: var(--c-text-2); background: rgba(255,255,255,0.06); }
.icon-btn.danger:hover { color: var(--c-danger); background: rgba(224,92,92,0.1); }


.conv-rename-input {
  flex: 1;
  background: var(--c-surface-3);
  border: 1px solid var(--c-border-2);
  border-radius: 4px;
  color: var(--c-text);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  padding: 4px 8px;
  outline: none;
  margin: 4px 0;
}
.conv-rename-input:focus { border-color: #555; }

.sb-divider {
  height: 1px;
  background: var(--c-border);
  margin: 6px 0;
  flex-shrink: 0;
}

#docs-section {
  flex-shrink: 0;
  border-top: 1px solid var(--c-border);
  padding-bottom: 30px;
  margin-top: -4px;
}

.upload-area {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px 10px;
  padding: 9px 16px;
  border: 1px dashed var(--c-border-2);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all 0.15s;
  gap: 7px;
}
.upload-area:hover {
  border-color: #4a4a4a;
  background: var(--c-surface);
}
.upload-area span {
  font-size: 12px;
  font-weight: 500;
  color: var(--c-text-2);
  white-space: nowrap;
}
.upload-area svg { color: var(--c-text-3); flex-shrink: 0; }
.upload-area:hover svg { color: var(--c-text-2); }
#file-input { display: none; }

#doc-list { padding: 0 6px; max-height: 140px; overflow-y: auto; }
#doc-list::-webkit-scrollbar { width: 3px; }
#doc-list::-webkit-scrollbar-thumb { background: var(--c-border-2); border-radius: 3px; }

.doc-item {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 10px;
  border-radius: var(--r-sm);
  font-size: 12px;
  color: var(--c-text-2);
  transition: background 0.12s;
}
.doc-item:hover { background: var(--c-surface-2); color: var(--c-text); }
.doc-icon { opacity: 0.4; flex-shrink: 0; font-size: 16px; }
.doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-status-ok { color: var(--c-green); font-size: 10px; flex-shrink: 0; }
.doc-status-pending { color: #f0b429; font-size: 10px; flex-shrink: 0; }
.doc-del { margin-left: auto; }


#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}


#topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--c-border);
  flex-shrink: 0;
}
.topbar-chat-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--c-text);
  letter-spacing: -0.02em;
}
.topbar-chat-id {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--c-text-3);
  margin-top: 1px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  color: var(--c-text-3);
  font-weight: 500;
}
.status-dot {
  width: 6px; height: 6px;
  background: var(--c-green);
  border-radius: 50%;
}

#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}
#chat-area::-webkit-scrollbar { width: 4px; }
#chat-area::-webkit-scrollbar-thumb { background: var(--c-border-2); border-radius: 4px; }

#messages {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* Message rows */
.msg-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: msg-in 0.2s ease forwards;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.assistant { flex-direction: row; }
.msg-row.assistant .msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--c-surface-3);
  border: 1px solid var(--c-border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  color: var(--c-text-2);
  flex-shrink: 0;
  margin-top: 2px;
  font-family: 'Geist Mono', monospace;
  letter-spacing: -0.03em;
}
.msg-row.assistant .msg-content {
  flex: 1;
  font-size: 14px;
  line-height: 1.75;
  color: var(--c-text);
  padding-top: 4px;
  min-width: 0;
}

.msg-row.user {
  flex-direction: row-reverse;
}
.msg-row.user .msg-avatar { display: none; }
.msg-row.user .msg-content {
  background: var(--c-user-msg);
  border: 1px solid var(--c-border-2);
  border-radius: var(--r-lg);
  padding: 10px 16px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--c-text);
  max-width: 75%;
  word-break: break-word;
}

.thinking-row .msg-content {
  display: flex; align-items: center; gap: 6px;
  padding-top: 4px;
  color: var(--c-text-3);
  font-size: 13px;
}
.thinking-dots span {
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--c-text-3);
  animation: blink 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%,80%,100% { opacity: 0.2; }
  40% { opacity: 1; }
}

.msg-content p { margin: 0 0 0.6em; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content code {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  background: var(--c-surface-3);
  padding: 1px 5px;
  border-radius: 3px;
  color: #c9d1d9;
}
.msg-content pre {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  overflow-x: auto;
  margin: 8px 0;
}
.msg-content pre code {
  background: none; padding: 0; font-size: 12.5px; line-height: 1.6;
}
.msg-content ul, .msg-content ol { padding-left: 1.4em; margin: 6px 0; }
.msg-content li { margin: 3px 0; }
.msg-content strong { font-weight: 600; color: var(--c-text); }
.msg-content h1,.msg-content h2,.msg-content h3 {
  font-weight: 600; margin: 12px 0 6px; letter-spacing: -0.02em;
}

#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-align: center;
  padding: 40px 24px;
  animation: fade-in 0.3s ease;
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.empty-icon {
  width: 44px; height: 44px;
  background: var(--c-surface-2);
  border: 1px solid var(--c-border-2);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace;
  font-size: 18px;
  color: var(--c-text-3);
  margin-bottom: 4px;
}
.empty-title {
  font-size: 17px; font-weight: 600;
  color: var(--c-text);
  letter-spacing: -0.03em;
}
.empty-sub {
  font-size: 13px;
  color: var(--c-text-3);
  line-height: 1.7;
  max-width: 300px;
}

#input-area {
  flex-shrink: 0;
  padding: 12px 24px 16px;
  border-top: 1px solid var(--c-border);
}
.input-wrap {
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--c-surface);
  border: 1px solid var(--c-border-2);
  border-radius: var(--r-lg);
  padding: 8px 8px 8px 16px;
  transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: #444; }

#msg-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--c-text);
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  max-height: 180px;
  min-height: 24px;
  overflow-y: auto;
}
#msg-input::placeholder { color: var(--c-text-3); }
#msg-input::-webkit-scrollbar { width: 2px; }
#msg-input::-webkit-scrollbar-thumb { background: var(--c-border-2); }

#send-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: var(--c-text);
  color: #0f0f0f;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}
#send-btn:hover { opacity: 0.88; }
#send-btn:active { transform: scale(0.94); }
#send-btn:disabled { opacity: 0.25; cursor: default; }

#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
  pointer-events: none;
}
.toast {
  padding: 9px 16px;
  background: var(--c-surface-3);
  border: 1px solid var(--c-border-2);
  border-radius: var(--r-md);
  font-size: 12.5px;
  color: var(--c-text);
  animation: toast-in 0.2s ease forwards;
  pointer-events: auto;
}
.toast.error { border-color: var(--c-danger); color: #f08080; }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-border-2); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">

  <aside id="sidebar">

    <div class="sb-header">
      <div class="sb-logo">S</div>
      <span class="sb-title">Smat Agent</span>
    </div>

    <button class="sb-new-btn" id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      New Conversation
    </button>

    <div class="sb-section-label">Conversations</div>
    <div id="conv-list"></div>

    <div id="docs-section">
      <div class="sb-section-label">Documents</div>

      <label class="upload-area" for="file-input">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 9V2M4 5l3-3 3 3M2 10v1.5A.5.5 0 002.5 12h9a.5.5 0 00.5-.5V10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Browse files</span>
      </label>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" />

      <div id="doc-list"></div>
    </div>

  </aside>

  <main id="main">

    <div id="topbar">
      <div class="topbar-left">
        <div class="topbar-chat-name" id="topbar-name">Smat Agent</div>
        <div class="topbar-chat-id" id="topbar-id">no conversation selected</div>
      </div>
      <div class="topbar-right">
        <div class="status-badge">
          <div class="status-dot"></div>
          online
        </div>
      </div>
    </div>

    <div id="empty-state">
      <div class="empty-icon">_</div>
      <div class="empty-title">No conversation selected</div>
      <div class="empty-sub">Create a new conversation to get started.</div>
    </div>

    <div id="chat-area" style="display:none">
      <div id="messages"></div>
    </div>

    <div id="input-area">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Message Smat Agent…" rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 2L7.5 13M3 6.5L7.5 2L12 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </main>
</div>

<div id="toast-container"></div>

<script>

const API = '/api';

let state = {
  chats: {},
  currentChatId: null,
  messages: [],
  docs: [],
  isThinking: false,
};

async function apiFetch(method, path, body, isFormData = false) {
  const opts = { method, headers: {} };

  if (body) {
    if (isFormData) {
      opts.body = body;
    } else {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
  }

  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  if (!text) return '';

  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>');

  return `<p>${html}</p>`;
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
}

function updateSendButton() {
  const input = document.getElementById('msg-input');
  const send = document.getElementById('send-btn');

  const hasText = input.value.trim().length > 0;
  const hasChat = !!state.currentChatId;

  send.disabled = !(hasText && hasChat && !state.isThinking);
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function appendMessage(role, content, animate = true) {
  const container = document.getElementById('messages');

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'assistant') {
    row.innerHTML = `
      <div class="msg-avatar">S</div>
      <div class="msg-content">${renderMarkdown(content)}</div>`;
  } else {
    row.innerHTML = `<div class="msg-content">${escHtml(content)}</div>`;
  }

  container.appendChild(row);
  scrollToBottom();
}

function showThinking() {
  const container = document.getElementById('messages');

  const row = document.createElement('div');
  row.id = "thinking-indicator";
  row.className = "msg-row assistant thinking-row";

  row.innerHTML = `
  <div class="msg-avatar">S</div>
  <div class="msg-content">
    <div class="thinking-dots">
      <span></span><span></span><span></span>
    </div>
  </div>`;

  container.appendChild(row);
  scrollToBottom();
}

function hideThinking() {
  const el = document.getElementById("thinking-indicator");
  if (el) el.remove();
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  state.messages.forEach(m => appendMessage(m.role, m.content, false));

  scrollToBottom();
}

function setView(mode) {
  const empty = document.getElementById('empty-state');
  const chat = document.getElementById('chat-area');

  if (mode === 'empty') {
    empty.style.display = 'flex';
    chat.style.display = 'none';
  }

  if (mode === 'new-chat') {
    empty.style.display = 'flex';
    chat.style.display = 'none';
  }

  if (mode === 'chat') {
    empty.style.display = 'none';
    chat.style.display = 'block';
  }

  updateSendButton();
}

function updateTopbar() {
  const nameEl = document.getElementById('topbar-name');
  const idEl = document.getElementById('topbar-id');

  if (!state.currentChatId) {
    nameEl.textContent = "Smat Agent";
    idEl.textContent = "no conversation selected";
    return;
  }

  const meta = state.chats[state.currentChatId];

  nameEl.textContent = meta?.name || "Untitled";
  idEl.textContent = "#" + state.currentChatId.slice(0,8);
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';

  const ids = Object.keys(state.chats);

  if (!ids.length) {
    list.innerHTML = '<div style="padding:10px;color:#555;font-size:12px">No conversations</div>';
    return;
  }

  ids.forEach(cid => {

    const meta = state.chats[cid];
    const isActive = cid === state.currentChatId;

    const item = document.createElement('div');
    item.className = 'conv-item' + (isActive ? ' active' : '');

    item.innerHTML = `
      <div class="conv-active-dot"></div>
      <div class="conv-name">${escHtml(meta.name)}</div>
    `;

    item.onclick = () => selectChat(cid);

    list.appendChild(item);
  });
}

async function loadChats() {
  try {

    const data = await apiFetch('GET', '/chats');

    state.chats = {};

    if (Array.isArray(data)) {
      data.forEach(c => state.chats[c.id] = c);
    }

    renderConvList();

  } catch(e) {
    console.error(e);
  }
}

async function selectChat(cid) {

  if (cid === state.currentChatId) return;

  try {

    const data = await apiFetch('GET', `/chats/${cid}`);

    state.currentChatId = cid;
    state.messages = data.messages || [];

    renderConvList();
    updateTopbar();

    if (state.messages.length === 0) {
      setView('new-chat');
    } else {
      setView('chat');
      renderMessages();
    }

    document.getElementById('msg-input').focus();

  } catch(e) {
    toast("Failed to load chat", "error");
  }
}

async function createChat() {

  try {

    const res = await apiFetch('POST', '/chats', { name:"New Conversation" });

    if (!res.id) return;

    state.chats[res.id] = res;
    state.currentChatId = res.id;
    state.messages = [];

    renderConvList();
    updateTopbar();
    setView('new-chat');

    document.getElementById('msg-input').focus();

  } catch(e) {
    toast("Failed to create chat","error");
  }
}

async function sendMessage(text) {

  if (!text || !state.currentChatId || state.isThinking) return;

  state.isThinking = true;
  updateSendButton();

  if (state.messages.length === 0) setView('chat');

  appendMessage("user", text);
  state.messages.push({role:"user",content:text});

  showThinking();

  const input = document.getElementById("msg-input");
  input.disabled = true;

  try {

    const res = await apiFetch(
      "POST",
      `/chats/${state.currentChatId}/messages`,
      {message:text}
    );

    hideThinking();

    const reply = res.reply || "No response";

    appendMessage("assistant", reply);

    state.messages = res.messages || [
      ...state.messages,
      {role:"assistant",content:reply}
    ];

    await loadChats();

  } catch(e) {

    hideThinking();

    appendMessage(
      "assistant",
      "An error occurred. Please try again."
    );

    toast("Message failed","error");

  } finally {

    state.isThinking = false;

    input.disabled = false;
    input.focus();

    updateSendButton();
  }
}

const msgInput = document.getElementById("msg-input");

msgInput.addEventListener("keydown", e => {

  if (e.key === "Enter" && !e.shiftKey) {

    e.preventDefault();

    const text = msgInput.value.trim();

    if (!text) return;

    msgInput.value = "";
    autoResize(msgInput);

    sendMessage(text);
  }
});

msgInput.addEventListener("input", () => {
  autoResize(msgInput);
  updateSendButton();
});

document.getElementById("send-btn").onclick = () => {

  const text = msgInput.value.trim();

  if (!text) return;

  msgInput.value = "";
  autoResize(msgInput);

  sendMessage(text);
};

document
  .getElementById("new-chat-btn")
  .addEventListener("click", createChat);

async function init() {

  await loadChats();

  setView("empty");

  updateSendButton();
}

init();
</script>
</body>
</html>
