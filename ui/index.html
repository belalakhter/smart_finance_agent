<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smat Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-bg:#0f0f0f; --c-sidebar:#141414; --c-surface:#1c1c1c;
  --c-surface-2:#242424; --c-surface-3:#2c2c2c;
  --c-border:#2a2a2a; --c-border-2:#333;
  --c-text:#e8e8e8; --c-text-2:#888; --c-text-3:#444;
  --c-danger:#e05c5c; --c-green:#4caf82; --c-user-msg:#1c1c1c;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
  --sidebar-w:300px; --topbar-h:52px; font-size:14px;
}
html,body { height:100%; background:var(--c-bg); color:var(--c-text);
  font-family:'Geist',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; }
#app { display:flex; height:100vh; width:100vw; overflow:hidden; }

/* Sidebar */
#sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--c-sidebar);
  border-right:1px solid var(--c-border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.sb-header { display:flex; align-items:center; gap:10px; padding:16px 16px 14px;
  border-bottom:1px solid var(--c-border); flex-shrink:0; }
.sb-logo { width:28px; height:28px; background:var(--c-text); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Geist Mono',monospace; font-size:13px; font-weight:500; color:#0f0f0f; flex-shrink:0; }
.sb-title { font-size:14px; font-weight:600; color:var(--c-text); letter-spacing:-0.02em; }
.sb-new-btn { display:flex; align-items:center; gap:8px; margin:12px 10px 6px; padding:8px 12px;
  background:transparent; border:1px solid var(--c-border-2); border-radius:var(--r-sm);
  color:var(--c-text-2); font-family:'Geist',sans-serif; font-size:13px; font-weight:500;
  cursor:pointer; transition:background 0.15s,color 0.15s,border-color 0.15s; flex-shrink:0; }
.sb-new-btn:hover { background:var(--c-surface-2); color:var(--c-text); border-color:#444; }
.sb-section-label { font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--c-text-3); padding:12px 16px 4px; flex-shrink:0; }
#conv-list { flex:1; overflow-y:auto; padding:2px 6px 8px; min-height:0; }
#conv-list::-webkit-scrollbar { width:3px; }
#conv-list::-webkit-scrollbar-thumb { background:var(--c-border-2); border-radius:3px; }
.conv-item { display:flex; align-items:center; gap:2px; padding:0 4px; border-radius:var(--r-sm);
  cursor:pointer; transition:background 0.12s; position:relative; min-height:34px; }
.conv-item:hover { background:var(--c-surface-2); }
.conv-item.active { background:var(--c-surface-3); }
.conv-name { flex:1; font-size:13px; color:var(--c-text-2); white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; padding:8px 4px; line-height:1.3; transition:color 0.12s; user-select:none; }
.conv-item:hover .conv-name,.conv-item.active .conv-name { color:var(--c-text); }
.conv-active-dot { width:5px; height:5px; background:var(--c-text-3); border-radius:50%;
  flex-shrink:0; margin-left:2px; display:none; }
.conv-item.active .conv-active-dot { display:block; background:var(--c-text-2); }
.conv-actions { display:flex; align-items:center; gap:2px; opacity:0; transition:opacity 0.12s; flex-shrink:0; }
.conv-item:hover .conv-actions,.conv-item.active .conv-actions { opacity:1; }
.icon-btn { display:flex; align-items:center; justify-content:center; width:26px; height:26px;
  border-radius:4px; border:none; background:transparent; color:var(--c-text-3);
  cursor:pointer; transition:color 0.12s,background 0.12s; flex-shrink:0; }
.icon-btn svg { width:14px; height:14px; }
.icon-btn:hover { color:var(--c-text-2); background:rgba(255,255,255,0.06); }
.icon-btn.danger:hover { color:var(--c-danger); background:rgba(224,92,92,0.1); }
.conv-rename-input { flex:1; background:var(--c-surface-3); border:1px solid var(--c-border-2);
  border-radius:4px; color:var(--c-text); font-family:'Geist',sans-serif; font-size:13px;
  padding:4px 8px; outline:none; margin:4px 2px; }
.conv-rename-input:focus { border-color:#555; }

/* Docs */
#docs-section { flex-shrink:0; border-top:1px solid var(--c-border); padding-bottom:8px; }
.upload-area { display:flex; align-items:center; justify-content:center; margin:8px 10px 6px;
  padding:9px 16px; border:1px dashed var(--c-border-2); border-radius:var(--r-sm);
  cursor:pointer; transition:all 0.15s; gap:7px; }
.upload-area:hover { border-color:#4a4a4a; background:var(--c-surface); }
.upload-area.uploading { opacity:0.5; pointer-events:none; }
.upload-area span { font-size:12px; font-weight:500; color:var(--c-text-2); white-space:nowrap; }
.upload-area svg { color:var(--c-text-3); flex-shrink:0; }
#file-input { display:none; }
#doc-list { padding:0 6px 4px; max-height:130px; overflow-y:auto; }
#doc-list::-webkit-scrollbar { width:3px; }
#doc-list::-webkit-scrollbar-thumb { background:var(--c-border-2); border-radius:3px; }
.doc-item { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:var(--r-sm);
  font-size:12px; color:var(--c-text-2); transition:background 0.12s; }
.doc-item:hover { background:var(--c-surface-2); color:var(--c-text); }
.doc-icon { opacity:0.5; flex-shrink:0; font-size:13px; line-height:1; }
.doc-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.doc-status { font-size:10px; flex-shrink:0; font-family:'Geist Mono',monospace; }
.doc-status.done { color:var(--c-green); }
.doc-status.pending { color:#f0b429; }
.doc-status.processing { color:#60a5fa; }
.doc-status.failed { color:var(--c-danger); }
.doc-del { margin-left:2px; flex-shrink:0; opacity:0; transition:opacity 0.12s; }
.doc-item:hover .doc-del { opacity:1; }

/* Main */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
#topbar { height:var(--topbar-h); min-height:var(--topbar-h); display:flex; align-items:center;
  justify-content:space-between; padding:0 28px; border-bottom:1px solid var(--c-border); flex-shrink:0; }
.topbar-chat-name { font-size:14px; font-weight:600; color:var(--c-text); letter-spacing:-0.02em; }
.topbar-chat-id { font-family:'Geist Mono',monospace; font-size:10px; color:var(--c-text-3); margin-top:1px; }
.topbar-right { display:flex; align-items:center; gap:6px; }
.status-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--c-text-3); font-weight:500; }
.status-dot { width:6px; height:6px; background:var(--c-green); border-radius:50%; }
#chat-area { flex:1; overflow-y:auto; padding:24px 0; scroll-behavior:smooth; }
#chat-area::-webkit-scrollbar { width:4px; }
#chat-area::-webkit-scrollbar-thumb { background:var(--c-border-2); border-radius:4px; }
#messages { max-width:700px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; gap:4px; }
.msg-row { display:flex; gap:12px; align-items:flex-start; animation:msg-in 0.2s ease forwards; }
@keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg-row.assistant .msg-avatar { width:28px; height:28px; border-radius:50%; background:var(--c-surface-3);
  border:1px solid var(--c-border-2); display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600; color:var(--c-text-2); flex-shrink:0; margin-top:2px;
  font-family:'Geist Mono',monospace; }
.msg-row.assistant .msg-content { flex:1; font-size:14px; line-height:1.75; color:var(--c-text); padding-top:4px; min-width:0; }
.msg-row.user { flex-direction:row-reverse; }
.msg-row.user .msg-avatar { display:none; }
.msg-row.user .msg-content { background:var(--c-user-msg); border:1px solid var(--c-border-2);
  border-radius:var(--r-lg); padding:10px 16px; font-size:14px; line-height:1.65;
  color:var(--c-text); max-width:75%; word-break:break-word; }
.thinking-row .msg-content { display:flex; align-items:center; gap:6px; padding-top:4px; color:var(--c-text-3); font-size:13px; }
.thinking-dots span { display:inline-block; width:4px; height:4px; border-radius:50%;
  background:var(--c-text-3); animation:blink 1.2s infinite; }
.thinking-dots span:nth-child(2){animation-delay:0.2s}.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.msg-content p{margin:0 0 0.6em}.msg-content p:last-child{margin-bottom:0}
.msg-content code{font-family:'Geist Mono',monospace;font-size:12px;background:var(--c-surface-3);padding:1px 5px;border-radius:3px;color:#c9d1d9}
.msg-content pre{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-md);padding:14px 16px;overflow-x:auto;margin:8px 0}
.msg-content pre code{background:none;padding:0;font-size:12.5px;line-height:1.6}
.msg-content ul,.msg-content ol{padding-left:1.4em;margin:6px 0}
.msg-content li{margin:3px 0}
.msg-content strong{font-weight:600;color:var(--c-text)}
.msg-content h1,.msg-content h2,.msg-content h3{font-weight:600;margin:12px 0 6px;letter-spacing:-0.02em}
#empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; text-align:center; padding:40px 24px; animation:fade-in 0.3s ease; }
@keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty-icon { width:44px; height:44px; background:var(--c-surface-2); border:1px solid var(--c-border-2);
  border-radius:var(--r-md); display:flex; align-items:center; justify-content:center;
  font-family:'Geist Mono',monospace; font-size:18px; color:var(--c-text-3); margin-bottom:4px; }
.empty-title{font-size:17px;font-weight:600;color:var(--c-text);letter-spacing:-0.03em}
.empty-sub{font-size:13px;color:var(--c-text-3);line-height:1.7;max-width:300px}
#input-area{flex-shrink:0;padding:12px 24px 16px;border-top:1px solid var(--c-border)}
.input-wrap{max-width:700px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;
  background:var(--c-surface);border:1px solid var(--c-border-2);border-radius:var(--r-lg);
  padding:8px 8px 8px 16px;transition:border-color 0.15s}
.input-wrap:focus-within{border-color:#444}
#msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--c-text);
  font-family:'Geist',sans-serif;font-size:14px;line-height:1.5;resize:none;max-height:180px;min-height:24px;overflow-y:auto}
#msg-input::placeholder{color:var(--c-text-3)}
#send-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;
  border-radius:8px;border:none;background:var(--c-text);color:#0f0f0f;cursor:pointer;flex-shrink:0;transition:opacity 0.15s,transform 0.1s}
#send-btn:hover{opacity:0.88}#send-btn:active{transform:scale(0.94)}#send-btn:disabled{opacity:0.25;cursor:default}
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:1000;pointer-events:none}
.toast{padding:9px 16px;background:var(--c-surface-3);border:1px solid var(--c-border-2);border-radius:var(--r-md);
  font-size:12.5px;color:var(--c-text);animation:toast-in 0.2s ease forwards;pointer-events:auto}
.toast.error{border-color:var(--c-danger);color:#f08080}
.toast.success{border-color:var(--c-green);color:#7dd3a8}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">S</div>
      <span class="sb-title">Smat Agent</span>
    </div>
    <button class="sb-new-btn" id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      New Conversation
    </button>
    <div class="sb-section-label">Conversations</div>
    <div id="conv-list"></div>
    <div id="docs-section">
      <div class="sb-section-label">Documents</div>
      <label class="upload-area" for="file-input" id="upload-label">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 9V2M4 5l3-3 3 3M2 10v1.5A.5.5 0 002.5 12h9a.5.5 0 00.5-.5V10"
            stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="upload-label-text">Browse files</span>
      </label>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" />
      <div id="doc-list"></div>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <div class="topbar-left">
        <div class="topbar-chat-name" id="topbar-name">Smat Agent</div>
        <div class="topbar-chat-id" id="topbar-id">no conversation selected</div>
      </div>
      <div class="topbar-right">
        <div class="status-badge"><div class="status-dot"></div>online</div>
      </div>
    </div>
    <div id="empty-state">
      <div class="empty-icon">_</div>
      <div class="empty-title">No conversation selected</div>
      <div class="empty-sub">Create a new conversation to get started.</div>
    </div>
    <div id="chat-area" style="display:none">
      <div id="messages"></div>
    </div>
    <div id="input-area">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Message Smat Agent…" rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 2L7.5 13M3 6.5L7.5 2L12 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script>
const API = '/api';
let state = { chats:{}, currentChatId:null, messages:[], docs:[], isThinking:false };

/* ── HTTP ── */
async function apiFetch(method, path, body, isFormData=false) {
  const opts = {method, headers:{}};
  if (body) {
    if (isFormData) { opts.body = body; }
    else { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  }
  const res = await fetch(API+path, opts);
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const j=await res.json(); msg=j.error||msg; } catch(_) {}
    throw new Error(msg);
  }
  const ct = res.headers.get('content-type')||'';
  return ct.includes('application/json') ? res.json() : res;
}

/* ── Toast ── */
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast'+(type==='error'?' error':type==='success'?' success':'');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

/* ── Utils ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderMarkdown(text) {
  if (!text) return '';
  let h = text
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code class="lang-${l}">${escHtml(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g,(_,c)=>`<code>${escHtml(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');
  return `<p>${h}</p>`;
}
function autoResize(ta) { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,180)+'px'; }
function scrollToBottom() { const a=document.getElementById('chat-area'); a.scrollTop=a.scrollHeight; }
function updateSendButton() {
  const i=document.getElementById('msg-input'), s=document.getElementById('send-btn');
  s.disabled = !(i.value.trim() && state.currentChatId && !state.isThinking);
}

/* ── Views ── */
function setView(mode) {
  const empty=document.getElementById('empty-state'), chat=document.getElementById('chat-area');
  if (mode==='chat') { empty.style.display='none'; chat.style.display='block'; }
  else { empty.style.display='flex'; chat.style.display='none'; }
  updateSendButton();
}
function updateTopbar() {
  const n=document.getElementById('topbar-name'), i=document.getElementById('topbar-id');
  if (!state.currentChatId) { n.textContent='Smat Agent'; i.textContent='no conversation selected'; return; }
  const m=state.chats[state.currentChatId];
  n.textContent=m?.name||'Untitled'; i.textContent='#'+state.currentChatId.slice(0,8);
}

/* ── Messages ── */
function appendMessage(role, content) {
  const c=document.getElementById('messages'), row=document.createElement('div');
  row.className=`msg-row ${role}`;
  if (role==='assistant') row.innerHTML=`<div class="msg-avatar">S</div><div class="msg-content">${renderMarkdown(content)}</div>`;
  else row.innerHTML=`<div class="msg-content">${escHtml(content)}</div>`;
  c.appendChild(row); scrollToBottom();
}
function showThinking() {
  const row=document.createElement('div'); row.id='thinking-indicator'; row.className='msg-row assistant thinking-row';
  row.innerHTML=`<div class="msg-avatar">S</div><div class="msg-content"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(row); scrollToBottom();
}
function hideThinking() { const e=document.getElementById('thinking-indicator'); if(e) e.remove(); }
function renderMessages() {
  document.getElementById('messages').innerHTML='';
  state.messages.forEach(m=>appendMessage(m.role,m.content)); scrollToBottom();
}

/* ── Conv list ── */
function renderConvList() {
  const list=document.getElementById('conv-list'); list.innerHTML='';
  const ids=Object.keys(state.chats);
  if (!ids.length) { list.innerHTML='<div style="padding:10px 16px;color:#555;font-size:12px">No conversations</div>'; return; }
  ids.forEach(cid => {
    const meta=state.chats[cid], isActive=cid===state.currentChatId;
    const item=document.createElement('div');
    item.className='conv-item'+(isActive?' active':'');
    item.innerHTML=`
      <div class="conv-active-dot"></div>
      <div class="conv-name">${escHtml(meta.name)}</div>
      <div class="conv-actions">
        <button class="icon-btn rename-btn" title="Rename">
          <svg viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn danger delete-btn" title="Delete">
          <svg viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;
    item.querySelector('.conv-name').addEventListener('click', ()=>selectChat(cid));
    item.querySelector('.conv-active-dot').addEventListener('click', ()=>selectChat(cid));
    item.querySelector('.rename-btn').addEventListener('click', e=>{ e.stopPropagation(); startRename(item,cid,meta.name); });
    item.querySelector('.delete-btn').addEventListener('click', e=>{ e.stopPropagation(); deleteChat(cid); });
    list.appendChild(item);
  });
}

/* ── Rename ── */
function startRename(item, cid, currentName) {
  const nameDiv=item.querySelector('.conv-name'), actions=item.querySelector('.conv-actions');
  const input=document.createElement('input'); input.className='conv-rename-input'; input.value=currentName;
  nameDiv.replaceWith(input); actions.style.display='none'; input.focus(); input.select();
  async function commit() {
    const newName=input.value.trim(); actions.style.display='';
    if (!newName||newName===currentName) { input.replaceWith(nameDiv); return; }
    try {
      await apiFetch('PATCH',`/chats/${cid}`,{name:newName});
      state.chats[cid].name=newName;
      if (cid===state.currentChatId) updateTopbar();
      renderConvList();
    } catch(e) { toast('Rename failed: '+e.message,'error'); input.replaceWith(nameDiv); }
  }
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){actions.style.display='';input.replaceWith(nameDiv);} });
  input.addEventListener('blur', commit);
}

/* ── Chat CRUD ── */
async function loadChats() {
  try {
    const data=await apiFetch('GET','/chats');
    state.chats={};
    if (Array.isArray(data)) data.forEach(c=>{state.chats[c.id]=c;});
    renderConvList();
  } catch(e) { toast('Failed to load chats: '+e.message,'error'); }
}
async function selectChat(cid) {
  if (cid===state.currentChatId) return;
  try {
    const data=await apiFetch('GET',`/chats/${cid}`);
    state.currentChatId=cid; state.messages=data.messages||[];
    renderConvList(); updateTopbar();
    if (state.messages.length===0) setView('empty');
    else { setView('chat'); renderMessages(); }
    document.getElementById('msg-input').focus();
  } catch(e) { toast('Failed to load chat: '+e.message,'error'); }
}
async function createChat() {
  try {
    const res=await apiFetch('POST','/chats',{name:'New Conversation'});
    if (!res.id) return;
    state.chats[res.id]=res; state.currentChatId=res.id; state.messages=[];
    renderConvList(); updateTopbar(); setView('empty');
    document.getElementById('msg-input').focus();
  } catch(e) { toast('Failed to create chat: '+e.message,'error'); }
}
async function deleteChat(cid) {
  try {
    await apiFetch('DELETE',`/chats/${cid}`);
    delete state.chats[cid];
    if (state.currentChatId===cid) { state.currentChatId=null; state.messages=[]; updateTopbar(); setView('empty'); }
    renderConvList(); toast('Conversation deleted');
  } catch(e) { toast('Delete failed: '+e.message,'error'); }
}

/* ── Send message ── */
async function sendMessage(text) {
  if (!text||!state.currentChatId||state.isThinking) return;
  state.isThinking=true; updateSendButton();
  if (state.messages.length===0) setView('chat');
  appendMessage('user',text); state.messages.push({role:'user',content:text}); showThinking();
  const input=document.getElementById('msg-input'); input.disabled=true;
  try {
    const res=await apiFetch('POST',`/chats/${state.currentChatId}/messages`,{message:text});
    hideThinking();
    const reply=res.reply||'No response';
    appendMessage('assistant',reply);
    state.messages=res.messages||[...state.messages,{role:'assistant',content:reply}];
    await loadChats();
  } catch(e) {
    hideThinking(); appendMessage('assistant','An error occurred. Please try again.');
    toast('Message failed: '+e.message,'error');
  } finally {
    state.isThinking=false; input.disabled=false; input.focus(); updateSendButton();
  }
}

/* ── Documents ── */
async function loadDocs() {
  try {
    const data=await apiFetch('GET','/documents');
    state.docs=Array.isArray(data)?data:[]; renderDocList();
  } catch(e) { console.error('Failed to load documents:',e.message); }
}
function renderDocList() {
  const list=document.getElementById('doc-list'); list.innerHTML='';
  if (!state.docs.length) return;
  state.docs.forEach(doc=>{
    const item=document.createElement('div'); item.className='doc-item';
    const ext=doc.filename.split('.').pop().toLowerCase();
    const icon=ext==='pdf'?'PDF':ext==='md'?'MD':'TXT';
    item.innerHTML=`
      <span class="doc-icon">${icon}</span>
      <span class="doc-name" title="${escHtml(doc.filename)}">${escHtml(doc.filename)}</span>
      <span class="doc-status ${doc.status}">${doc.status}</span>
      <button class="icon-btn danger doc-del" title="Delete">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>`;
    item.querySelector('.doc-del').addEventListener('click', e=>{ e.stopPropagation(); deleteDocument(doc.id,doc.filename); });
    list.appendChild(item);
  });
}
async function uploadDocument(file) {
  if (state.docs.some(d => d.filename === file.name)) {
    toast(`"${file.name}" is already uploaded. Delete it first.`, 'error');
    document.getElementById('file-input').value = '';
    return;
  }
  const label=document.getElementById('upload-label'), labelText=document.getElementById('upload-label-text');
  label.classList.add('uploading'); labelText.textContent='Uploading…';
  const fd=new FormData(); fd.append('file',file);
  try {
    const res=await apiFetch('POST','/documents',fd,true);
    state.docs.unshift(res); renderDocList(); toast(`"${res.filename}" uploaded`,'success');
  } catch(e) { toast('Upload failed: '+e.message,'error'); }
  finally { label.classList.remove('uploading'); labelText.textContent='Browse files'; document.getElementById('file-input').value=''; }
}
async function deleteDocument(docId, filename) {
  try {
    await apiFetch('DELETE',`/documents/${docId}`);
    state.docs=state.docs.filter(d=>d.id!==docId); renderDocList(); toast(`"${filename}" deleted`);
  } catch(e) { toast('Delete failed: '+e.message,'error'); }
}

/* ── Events ── */
document.getElementById('file-input').addEventListener('change', e=>{ const f=e.target.files[0]; if(f) uploadDocument(f); });
const msgInput=document.getElementById('msg-input');
msgInput.addEventListener('keydown', e=>{
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); const t=msgInput.value.trim(); if(!t) return; msgInput.value=''; autoResize(msgInput); sendMessage(t); }
});
msgInput.addEventListener('input', ()=>{ autoResize(msgInput); updateSendButton(); });
document.getElementById('send-btn').addEventListener('click', ()=>{ const t=msgInput.value.trim(); if(!t) return; msgInput.value=''; autoResize(msgInput); sendMessage(t); });
document.getElementById('new-chat-btn').addEventListener('click', createChat);

/* ── Init ── */
async function init() { await Promise.all([loadChats(), loadDocs()]); setView('empty'); updateSendButton(); }
init();
</script>
</body>
</html>
