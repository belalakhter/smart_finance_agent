services:
  db:
    image: postgres:15
    container_name: smart_agent_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_agent_migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      python -c "from app.database.connection import init_connection_pool; init_connection_pool()"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_agent_dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data: